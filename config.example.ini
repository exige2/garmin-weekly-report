# ════════════════════════════════════════════════════════════
#  設定ファイル（このファイルを config.ini という名前でコピーして使います）
#
#   cp config.example.ini config.ini   （Mac / Linux）
#   copy config.example.ini config.ini （Windows）
#
#  各値の取得方法は README.md を参照してください。
#  config.ini にはパスワード・APIキーが含まれます。絶対に他人に渡したり
#  GitHub等に公開したりしないでください（.gitignore で除外済み）。
#
#  ※ GitHub Actions等のクラウド実行では config.ini は不要です。
#    同じ項目を環境変数（Secrets）で渡せます（環境変数が優先されます）。
#    対応する環境変数名は README.md の「PCレス運用」を参照。
# ════════════════════════════════════════════════════════════

[garmin]
# Garmin Connect のログイン情報
email    = your_email@example.com
password = your_password

[gemini]
# Google AI Studio で取得したAPIキー（クレカ不要・無料枠）
api_key = your_gemini_api_key
# 使用モデル（無料枠: gemini-2.5-flash / さらに軽量: gemini-2.5-flash-lite）
model   = gemini-2.5-flash

[line]
# LINE Messaging API のチャネルアクセストークン（長期）と、自分のユーザーID
channel_access_token = your_line_channel_access_token
user_id              = your_line_user_id

[goal]
# 目標とプロフィール（自由に書き換えてください。LLMの分析に渡されます）
marathon_time = 3時間30分
race_pace     = 4:58/km
# 複数行で書く場合は、2行目以降を必ず半角スペースで字下げしてください
profile =
    - 目標: フルマラソン サブ3.5（3時間30分切り）
    - 必要レースペース: 4:58/km
    - トレーニング方針: 80/20ルール（有酸素80%、高強度20%）
    - ロング走目標: 週1回 20〜30km
    - 週間走行距離目標: 50〜70km
    - レース日: 2026年11月3日　群馬マラソン
